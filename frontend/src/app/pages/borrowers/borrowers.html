<div class="flex flex-col gap-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Personas</h1>
      <p class="text-sm text-gray-500 mt-1">Gestiona las personas a quienes prestas objetos</p>
    </div>
    <button
      (click)="openCreate()"
      class="flex items-center gap-2 px-4 py-2.5 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-xl transition-all duration-200 shadow-sm">
      <i class="pi pi-plus text-sm"></i>
      Nueva persona
    </button>
  </div>

  <!-- Table -->
  <div class="bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
    <p-table
      [value]="borrowers"
      [loading]="loading"
      [tableStyle]="{ 'min-width': '40rem' }"
      styleClass="p-datatable-sm">

      <ng-template #header>
        <tr>
          <th class="text-xs font-semibold text-gray-500 uppercase">Nombre</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Contacto</th>
          <th class="text-xs font-semibold text-gray-500 uppercase">Acciones</th>
        </tr>
      </ng-template>

      <ng-template #body let-borrower>
        <tr class="hover:bg-gray-50 transition-colors duration-150">
          <td class="text-sm font-medium text-gray-900">{{ borrower.name }}</td>
          <td class="text-sm text-gray-500">{{ borrower.contact_info || '—' }}</td>
          <td>
            <div class="flex items-center gap-2">
              <button
                (click)="openEdit(borrower)"
                class="w-8 h-8 flex items-center justify-center rounded-lg bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-600 transition-all duration-200"
                title="Editar">
                <i class="pi pi-pencil text-xs"></i>
              </button>
              <button
                (click)="deleteBorrower(borrower)"
                class="w-8 h-8 flex items-center justify-center rounded-lg bg-red-50 hover:bg-red-100 border border-red-200 text-red-500 transition-all duration-200"
                title="Eliminar">
                <i class="pi pi-trash text-xs"></i>
              </button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template #empty>
        <tr>
          <td colspan="3" class="text-center text-gray-400 py-12">
            <i class="pi pi-users text-3xl mb-3 block"></i>
            No hay personas registradas
          </td>
        </tr>
      </ng-template>

    </p-table>
  </div>

  <!-- Modal -->
  <p-dialog
    [(visible)]="showModal"
    [header]="isEditing ? 'Editar persona' : 'Nueva persona'"
    [modal]="true"
    [style]="{ width: '450px' }"
    [draggable]="false"
    [resizable]="false">

    <div class="flex flex-col gap-5 py-2">

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Nombre</label>
        <input
          pInputText
          [(ngModel)]="form.name"
          placeholder="Nombre completo"
          class="w-full" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Contacto <span class="text-gray-400">(opcional)</span></label>
        <input
          pInputText
          [(ngModel)]="form.contact_info"
          placeholder="Teléfono o referencia"
          class="w-full" />
      </div>

    </div>

    <ng-template #footer>
      <div class="flex items-center justify-end gap-3">
        <button
          (click)="showModal = false"
          class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-900 border border-gray-200 hover:border-gray-300 rounded-xl transition-all duration-200">
          Cancelar
        </button>
        <button
          (click)="save()"
          class="px-4 py-2 text-sm font-semibold text-white bg-green-600 hover:bg-green-700 rounded-xl transition-all duration-200 shadow-sm">
          {{ isEditing ? 'Guardar cambios' : 'Crear persona' }}
        </button>
      </div>
    </ng-template>

  </p-dialog>

  <!-- Confirm dialog -->
  <p-confirmdialog />

</div>
